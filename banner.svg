<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080711" />
      <stop offset="50%" stop-color="#0f0e26" />
      <stop offset="100%" stop-color="#05050d" />
    </linearGradient>

    <!-- Text Gradient for Name -->
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#a154f2" />
    </linearGradient>

    <!-- Subtitle/Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#05ffc3" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Cyberpunk grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.02" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-grad)" />

  <!-- Grid overlay -->
  <rect width="800" height="250" fill="url(#grid)" />

  <!-- Abstract Cybernetic Lines / Graph Nodes (The Linear Paradigm) -->
  <g stroke="#4facfe" stroke-width="0.75" opacity="0.2">
    <line x1="580" y1="50" x2="680" y2="80" />
    <line x1="680" y1="80" x2="630" y2="170" />
    <line x1="630" y1="170" x2="720" y2="120" />
    <line x1="720" y1="120" x2="580" y2="50" />
    <line x1="680" y1="80" x2="750" y2="60" />
    <line x1="720" y1="120" x2="750" y2="60" />
    <line x1="630" y1="170" x2="560" y2="200" />
    <line x1="580" y1="50" x2="520" y2="110" />
    <line x1="520" y1="110" x2="560" y2="200" />
  </g>

  <!-- Glowing Nodes -->
  <g fill="#00f2fe" opacity="0.7" filter="url(#glow-subtle)">
    <circle cx="580" cy="50" r="4.5" fill="#00f2fe" />
    <circle cx="680" cy="80" r="6" fill="#a154f2" />
    <circle cx="630" cy="170" r="4.5" fill="#00f2fe" />
    <circle cx="720" cy="120" r="5" fill="#05ffc3" />
    <circle cx="750" cy="60" r="3.5" fill="#4facfe" />
    <circle cx="560" cy="200" r="4" fill="#a154f2" />
    <circle cx="520" cy="110" r="4" fill="#05ffc3" />
  </g>

  <!-- Decorative Border Accents -->
  <!-- Top cyber-bar -->
  <path d="M 40,25 L 180,25 L 190,35 L 320,35" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.4" />
  <circle cx="40" cy="25" r="2.5" fill="#00f2fe" opacity="0.6" />
  
  <!-- Bottom cyber-bar -->
  <path d="M 760,225 L 620,225 L 610,215 L 480,215" fill="none" stroke="#a154f2" stroke-width="1.5" opacity="0.4" />
  <circle cx="760" cy="225" r="2.5" fill="#a154f2" opacity="0.6" />

  <!-- Code brackets / symbols as watermarks -->
  <text x="50" y="210" font-family="Courier, monospace" font-size="24" fill="#ffffff" opacity="0.04" font-weight="bold">&lt;/&gt;</text>
  <text x="710" y="205" font-family="Courier, monospace" font-size="24" fill="#ffffff" opacity="0.04" font-weight="bold">{ }</text>

  <!-- Name -->
  <text x="60" y="105" font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif" font-size="38" font-weight="900" fill="url(#name-grad)" letter-spacing="1.5">
    GANESH GIRIDHAR
  </text>

  <!-- Title / Tagline -->
  <text x="63" y="138" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.9" letter-spacing="2.5">
    AI ENGINEER &amp; FULL-STACK DEVELOPER
  </text>

  <!-- Secondary Title -->
  <text x="63" y="165" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="500" fill="url(#accent-grad)" letter-spacing="1.8">
    THE LINEAR PARADIGM // DIGITAL TWIN CREATOR
  </text>

  <!-- Status indicator -->
  <g transform="translate(63, 185)">
    <circle cx="6" cy="6" r="3.5" fill="#05ffc3" filter="url(#glow-subtle)" />
    <text x="18" y="10" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#ffffff" opacity="0.65" letter-spacing="1">
      SYSTEM: ACTIVE // BUILDING COGNITIVE SYSTEMS
    </text>
  </g>
</svg>
